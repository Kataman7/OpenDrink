<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f0f1a" />
    <link rel="icon" type="image/x-icon" href="/icon.ico" />
    <title>OpenDrink</title>
    <script type="module" crossorigin src="/assets/index-RfdKsSL6.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-wixghL4D.css">
  </head>
  <body>
    <div id="app" class="app-shell">

      <!-- SCREEN: LOBBY -->
      <section id="screen-lobby" class="screen">
        <div class="screen-inner">
          <h1 class="title" data-i18n="app.title">OpenDrink</h1>
          <p class="subtitle" data-i18n="lobby.subtitle">Add players to start</p>

          <div class="field-group">
            <label class="field-label" for="lang-select" data-i18n="lobby.language">Language</label>
            <select id="lang-select" class="input-field select-field"></select>
          </div>

          <div class="input-row">
            <input
              type="text"
              id="player-name-input"
              class="input-field"
              placeholder="Player name"
              data-i18n-placeholder="lobby.playerPlaceholder"
              maxlength="20"
              autocomplete="off"
            />
            <button id="btn-add-player" class="btn btn-primary" data-action="add-player">+</button>
          </div>

          <p id="player-count" class="player-count">0 players</p>
          <ul id="player-list" class="player-list"></ul>

          <button id="btn-start-game" class="btn btn-large btn-accent" data-action="start-game" data-i18n="lobby.startGame">Start game</button>
        </div>
      </section>

      <!-- SCREEN: MODE -->
      <section id="screen-mode" class="screen hidden">
        <div class="screen-inner">
          <h2 class="title" data-i18n="mode.title">Choose mode</h2>
          <div class="mode-buttons">
            <button class="btn btn-large btn-mode" data-action="select-mode" data-mode="never_have_i_ever">
              <span class="btn-mode-icon">🍻</span>
              <span data-i18n="mode.neverHaveIEver">Never Have I Ever</span>
            </button>
            <button class="btn btn-large btn-mode" data-action="select-mode" data-mode="action_truth">
              <span class="btn-mode-icon">🎭</span>
              <span data-i18n="mode.truthOrDare">Truth or Dare</span>
            </button>
            <button class="btn btn-large btn-mode" data-action="select-mode" data-mode="would_you_rather">
              <span class="btn-mode-icon">⚡</span>
              <span data-i18n="mode.wouldYouRather">Would You Rather</span>
            </button>
            <button class="btn btn-large btn-mode" data-action="select-mode" data-mode="who_could">
              <span class="btn-mode-icon">🕵️</span>
              <span data-i18n="mode.whoCould">Who Could</span>
            </button>
            <button class="btn btn-large btn-mode" data-action="select-mode" data-mode="impostor">
              <span class="btn-mode-icon">🎯</span>
              <span data-i18n="mode.impostor">Impostor</span>
            </button>
          </div>
          <button id="btn-back-lobby" class="btn btn-secondary btn-small" data-action="back-lobby" data-i18n="common.back">Back</button>
        </div>
      </section>

      <!-- SCREEN: IMPOSTOR REVEAL -->
      <section id="screen-impostor_reveal" class="screen hidden">
        <div class="screen-inner game-screen-inner">
          <div class="game-card">
            <p id="impostor-step-title" class="game-player"></p>
            <p id="impostor-step-hint" class="game-type"></p>
            <p id="impostor-word" class="game-text hidden"></p>
            <div id="impostor-accusation" class="hidden">
              <div id="impostor-candidates" class="mode-buttons"></div>
              <p id="impostor-result" class="subtitle"></p>
            </div>
          </div>
          <button id="btn-impostor-reveal" class="btn btn-large btn-primary" data-action="impostor-reveal" data-i18n="impostor.revealWord">Reveal word</button>
          <button id="btn-impostor-next" class="btn btn-large btn-accent hidden" data-action="impostor-next" data-i18n="impostor.nextPlayer">Next player</button>
          <button id="btn-impostor-finish" class="btn btn-large btn-accent hidden" data-action="impostor-finish" data-i18n="impostor.startAccusation">Start accusation</button>
          <button class="btn btn-secondary btn-small" data-action="back-lobby" data-i18n="game.backToLobby">Back to lobby</button>
        </div>
      </section>

      <!-- SCREEN: INTENSITY -->
      <section id="screen-intensity" class="screen hidden">
        <div class="screen-inner">
          <h2 class="title" data-i18n="intensity.title">Intensity</h2>
          <div class="mode-buttons">
            <button class="btn btn-large btn-intensity" data-action="select-intensity" data-intensity="soft">
              <span class="btn-mode-icon">😊</span>
              <span data-i18n="intensity.soft">Soft</span>
            </button>
            <button class="btn btn-large btn-intensity" data-action="select-intensity" data-intensity="hot">
              <span class="btn-mode-icon">🔥</span>
              <span data-i18n="intensity.hot">Hot</span>
            </button>
            <button class="btn btn-large btn-intensity" data-action="select-intensity" data-intensity="mixed">
              <span class="btn-mode-icon">🎲</span>
              <span data-i18n="intensity.mixed">Mixed</span>
            </button>
          </div>
          <button id="btn-back-lobby" class="btn btn-secondary btn-small" data-action="back-lobby" data-i18n="common.back">Back</button>
        </div>
      </section>

      <!-- SCREEN: GAME -->
      <section id="screen-game" class="screen hidden">
        <div class="screen-inner game-screen-inner">
          <div class="game-card">
            <p id="player-name" class="game-player"></p>
            <p id="question-type" class="game-type"></p>
            <p id="question-text" class="game-text"></p>
            <div id="wyr-choices" class="wyr-choices hidden">
              <p id="wyr-choice-a" class="wyr-choice"></p>
              <p id="wyr-separator" class="wyr-separator" data-i18n="game.or">OR</p>
              <p id="wyr-choice-b" class="wyr-choice"></p>
            </div>
          </div>
          <button id="btn-next" class="btn btn-large btn-primary" data-action="next-round" data-i18n="game.next">Next</button>
          <button id="btn-back-lobby" class="btn btn-secondary btn-small" data-action="back-lobby" data-i18n="game.backToLobby">Back to lobby</button>
        </div>
      </section>

      <!-- ERROR TOAST -->
      <div id="error-toast" class="error-toast hidden"></div>

      <footer class="site-footer">
        <a
          href="https://github.com/Kataman7/OpenDrink"
          target="_blank"
          rel="noreferrer"
        >
          github.com/Kataman7/OpenDrink
        </a>
      </footer>

    </div>

  </body>
</html>
